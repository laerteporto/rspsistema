<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSP Dashboard | Prestação de Serviços</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar">
    <div class="brand">
        <h1 class="brand-title">RSP <span style="color:var(--primary);">Serviços</span></h1>
    </div>
    <div class="nav-links">
        <a href="index.html">Dashboard</a>
        <a href="service_form.html">Nova OS</a>
        <a href="clientes.html">Clientes</a>
        <a href="reports.html">Relatórios</a>
        <a href="configuracoes.html">Configurações</a>
    </div>
</nav>

<div class="container">
    <div class="dash-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem;">
        <div>
            <h2 style="margin-bottom:.2rem;">Visão Geral</h2>
            <p style="font-size:.88rem;color:var(--text-muted);" id="dash-date"></p>
        </div>
        <div class="btn-group" style="display:flex;gap:.75rem;flex-wrap:wrap;">
            <button class="btn btn-outline btn-sm" id="btn-sync" onclick="forceSyncAll()"
                title="Sincronizar orçamentos locais com o Firebase">
                ☁️ Sincronizar
            </button>
            <a href="service_form.html" class="btn btn-primary">+ Nova OS</a>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="stat-card">
            <h3>Pendentes / Aguardando</h3>
            <div class="value" id="stat-pending">—</div>
        </div>
        <div class="stat-card" style="border-left-color:var(--success);">
            <h3>Serviços Aprovados</h3>
            <div class="value" style="color:var(--success);" id="stat-inprogress">—</div>
        </div>
        <div class="stat-card" style="border-left-color:var(--info);">
            <h3>Concluídos</h3>
            <div class="value" style="color:var(--info);" id="stat-completed">—</div>
        </div>
    </div>

    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;">
            <h3 style="border:none;padding:0;margin:0;">Ordens de Serviço Recentes</h3>
            <span id="total-os-label" style="font-size:.82rem;color:var(--text-muted);"></span>
        </div>
        <div class="table-container">
            <table id="dashboard-table">
                <thead>
                    <tr>
                        <th>OS #</th>
                        <th>Cliente</th>
                        <th>Categoria</th>
                        <th>Data</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script src="darkmode.js"></script>
<script src="auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
<script>
    // Data no header
    const dd = document.getElementById('dash-date');
    if (dd) dd.textContent = new Date().toLocaleDateString('pt-BR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
</script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (window.RSPAuth) window.RSPAuth.injectLogoutButton();
    });
</script>

<!-- Bottom Navigation — mobile only -->
<nav class="bottom-nav">
    <a href="index.html" data-page="index">
        <span class="nav-icon">🏠</span>Dashboard
    </a>
    <a href="service_form.html" data-page="service_form">
        <span class="nav-icon">➕</span>Nova OS
    </a>
    <a href="clientes.html" data-page="clientes">
        <span class="nav-icon">👥</span>Clientes
    </a>
    <a href="reports.html" data-page="reports">
        <span class="nav-icon">📊</span>Relatórios
    </a>
    <a href="configuracoes.html" data-page="configuracoes">
        <span class="nav-icon">⚙️</span>Config
    </a>
</nav>
<script>
(function(){
    var page = location.pathname.split('/').pop().replace('.html','') || 'index';
    var links = document.querySelectorAll('.bottom-nav a');
    links.forEach(function(a){
        if(a.dataset.page === page) a.classList.add('active');
    });
})();
</script>
</body>
</html>
